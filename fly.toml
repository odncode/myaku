# fly.toml app configuration file generated for myaku on 2026-05-20T08:13:50+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'myaku'
primary_region = 'lhr'

[build]
  dockerfile = "myaku-api/Dockerfile"

[env]
  PORT = '8080'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
